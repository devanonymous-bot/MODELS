<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo">M Port<span>.</span><br>folio</div>
  <div class="header-meta"><div>Proyectos Web</div><div>2026</div></div>
</header>

<div class="counter">
  <div>Proyectos: <span>11</span></div>
  <div>Estado: <span>Activo</span></div>
  <div>Actualización: <span>Mar 2026</span></div>
</div>

<main id="grid"></main>

<footer>
  <span>© 2026 M Portfolio</span>
  <span>11 perfiles activos</span>
</footer>

<script>
  const models = [
    { id: 'tiffany',  num: '01', tag: 'Streaming · Proyecto 01', name: 'Tiffany Spears',  url: 'livejasmin.com/TiffanySpears',  thumb: 'images/msc.jpg' },
    { id: 'kathe',    num: '02', tag: 'Streaming · Proyecto 02', name: 'Kathe Salvatore', url: 'livejasmin.com/KatheSalvatore', thumb: 'images/kts.jpg' },
    { id: 'paula',    num: '03', tag: 'Streaming · Proyecto 03', name: 'Paula Stivens',   url: 'paulastivens.com',              thumb: 'images/sps.jpg' },
    { id: 'caylin',   num: '04', tag: 'Streaming · Proyecto 04', name: 'Caylin & Liza',   url: 'es.recu.me/caylin_and_liza',    thumb: 'images/caylin.jpg' },
    { id: 'lea',      num: '05', tag: 'Streaming · Proyecto 05', name: 'Lea Noira',       url: 'livejasmin.com/LeaNoira',       thumb: 'images/kt.jpg'  },
    { id: 'lizz',     num: '06', tag: 'Streaming · Proyecto 06', name: 'Lizz Connor',     url: 'livejasmin.com/LizzConnor',     thumb: 'images/ksc.jpg' },
    { id: 'alaya',    num: '07', tag: 'Streaming · Proyecto 07', name: 'Alaya1991',       url: 'savemycam.com/alaya1991',       thumb: 'images/la.jpg'  },
    { id: 'michell',  num: '08', tag: 'Streaming · Proyecto 08', name: 'Michell-Ass',     url: 'camsoda.com/michell-ass',       thumb: 'images/ma.png'  },
    { id: 'alicebets',num: '09', tag: 'Streaming · Proyecto 09', name: 'Alice Bets',      url: 'livejasmin.com/alicebets',      thumb: 'images/alice.png'  },
    { id: 'allison',  num: '10', tag: 'Streaming · Proyecto 10', name: 'Alison Hill',     url: 'livejasmin.com/alison-hill',    thumb: 'images/allison.png'  },
    { id: 'emily',    num: '11', tag: 'Streaming · Proyecto 11', name: 'Emily red',       url: 'livejasmin.com/emilyred',       thumb: 'images/emily.png'  },
  ];

  const grid = document.getElementById('grid');
  models.forEach(m => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = `profile.html?id=${m.id}`;
    a.innerHTML = `
      <div class="card-img-wrap">
        <img src="${m.thumb}" alt="${m.name}" onerror="this.style.opacity=0">
        <div class="card-num-overlay">${m.num}</div>
      </div>
      <div class="card-body">
        <div class="card-tag">${m.tag}</div>
        <div class="card-title">${m.name}</div>
        <div class="card-url">${m.url}</div>
        <div class="card-arrow">Ver perfil
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 6h10M6 1l5 5-5 5"/></svg>
        </div>
      </div>`;
    grid.appendChild(a);
  });
</script>

</body>
</html>
